<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Postal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #eef2f3;
            margin: 0;
            padding: 20px;
        }

        .contenedor{
            max-width: 400px;
            background: white;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #34495e;
        }

        label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: #21618c;
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Validar Código Postal</h1>

        <form onsubmit="validar(event)">

            <label>Código Postal</label>

            <input 
                type="text"
                pattern="[0-9]{5}"
                maxlength="5"
                placeholder="Ejemplo: 12345"
                required
            >

            <button type="submit">Enviar</button>

        </form>

    </div>

    <script>
        function validar(event){
            event.preventDefault();
            alert("Código Postal válido");
        }
    </script>

</body>
</html>
